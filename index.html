<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SCRIPTS DEL 01</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Arial', sans-serif;
        }

        body {
            background: #0a0a0a;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
        }

        .container {
            background: #1a1a1a;
            padding: 40px 30px;
            border-radius: 20px;
            width: 90%;
            max-width: 400px;
            text-align: center;
        }

        .profile-pic {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            margin: 0 auto 20px;
            border: 3px solid #2a2a2a;
            object-fit: cover;
            background: #000;
            filter: brightness(0); /* ESTO LA HACE NEGRA */
        }

        .title {
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 40px;
            color: #ffffff;
        }

        .key-section {
            margin-bottom: 20px;
        }

        .key-input {
            width: 100%;
            padding: 18px;
            background: #2a2a2a;
            border: none;
            border-radius: 12px;
            color: white;
            font-size: 16px;
            margin-bottom: 20px;
            text-align: center;
        }

        .key-input::placeholder {
            color: #888;
        }

        .key-input:focus {
            outline: none;
            background: #333;
        }

        .btn {
            background: #0088ff;
            color: white;
            border: none;
            padding: 18px;
            border-radius: 12px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            transition: all 0.2s;
        }

        .btn:hover {
            background: #0077dd;
            transform: scale(1.02);
        }

        .btn:active {
            transform: scale(0.98);
        }

        .scripts-section {
            display: none;
            margin-top: 20px;
        }

        .script-box {
            background: #2a2a2a;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 15px;
            text-align: left;
        }

        .script-title {
            color: #0088ff;
            font-size: 18px;
            margin-bottom: 12px;
            font-weight: bold;
        }

        .script-code {
            background: #0a0a0a;
            padding: 15px;
            border-radius: 8px;
            font-family: 'Courier New', monospace;
            font-size: 11px;
            color: #00ff00;
            word-break: break-all;
            margin-bottom: 15px;
        }

        .copy-btn {
            background: #0088ff;
            color: white;
            border: none;
            padding: 14px;
            border-radius: 10px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
        }

        .copy-btn.copied {
            background: #00cc00;
        }

        .error {
            color: #ff4444;
            margin-top: 10px;
            font-size: 14px;
            display: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="key-section" id="keySection">
            <img src="logo.png" alt="Logo" class="profile-pic">
            <h1 class="title">EL 01 ROX HUB | KEY SYSTEM</h1>
            <input type="text" class="key-input" id="keyInput" placeholder="Ingresa tu KEY..." autocomplete="off">
            <button class="btn" onclick="checkKey()">Llave Verificar</button>
            <div class="error" id="errorMsg">Key incorrecta</div>
        </div>

        <div class="scripts-section" id="scriptsSection">
            <h1 class="title">SCRIPTS DEL 01</h1>
            <div class="script-box">
                <div class="script-title">EL 01 ROX HUB</div>
                <div class="script-code" id="scriptCode">loadstring(game:HttpGet("https://raw.githubusercontent.com/mimi145324-svg/EL-01-ROX-HUB/main/main.lua"))()</div>
                <button class="copy-btn" id="copyBtn" onclick="copyScript()">COPIAR SCRIPT</button>
            </div>
        </div>
    </div>

    <script>
        const correctKey = "EL 01 ROX HUB";
        const keyInput = document.getElementById('keyInput');
        const keySection = document.getElementById('keySection');
        const scriptsSection = document.getElementById('scriptsSection');
        const errorMsg = document.getElementById('errorMsg');
        const copyBtn = document.getElementById('copyBtn');
        const scriptCode = document.getElementById('scriptCode');

        function checkKey() {
            if (keyInput.value === correctKey) {
                keySection.style.display = 'none';
                scriptsSection.style.display = 'block';
                errorMsg.style.display = 'none';
            } else {
                errorMsg.style.display = 'block';
                keyInput.style.background = '#3a2a2a';
                setTimeout(() => {
                    keyInput.style.background = '#2a2a2a';
                }, 800);
            }
        }

        function copyScript() {
            navigator.clipboard.writeText(scriptCode.textContent).then(() => {
                copyBtn.textContent = '¡COPIADO!';
                copyBtn.classList.add('copied');
                setTimeout(() => {
                    copyBtn.textContent = 'COPIAR SCRIPT';
                    copyBtn.classList.remove('copied');
                }, 2000);
            });
        }

        keyInput.addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                checkKey();
            }
        });
    </script>
</body>
</html>
