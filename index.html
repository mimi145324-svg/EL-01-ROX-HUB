<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>EL 01 ROX HUB</title>

<style>
body {
    margin: 0;
    background: black;
    font-family: Arial;
    overflow: hidden;
    color: white;
}

/* CANVAS */
canvas {
    position: fixed;
    top: 0;
    left: 0;
}

/* CAJA */
.container {
    position: relative;
    z-index: 2;
    width: 340px;
    margin: 120px auto;
    background: #111;
    padding: 30px;
    border-radius: 20px;
    text-align: center;
}

/* TEXTO GRANDE */
h1 {
    font-size: 22px;
    text-shadow: 0 0 10px #1e90ff;
}

/* INPUT */
input {
    width: 90%;
    padding: 14px;
    border-radius: 12px;
    border: none;
    background: #222;
    color: white;
    margin-top: 20px;
    font-size: 16px;
}

/* BOTONES */
button {
    width: 95%;
    padding: 15px;
    margin-top: 15px;
    border: none;
    border-radius: 15px;
    background: #1e90ff;
    color: white;
    font-size: 16px;
    cursor: pointer;
}

.hidden {
    display: none;
}

/* ERROR 404 */
#error404 {
    position: fixed;
    width: 100%;
    height: 100%;
    background: white;
    color: black;
    display: none;
    justify-content: center;
    align-items: center;
    font-size: 40px;
    font-weight: bold;
}
</style>
</head>

<body>

<canvas id="bg"></canvas>

<!-- MAIN -->
<div class="container" id="main">
    <h1>EL 01 ROX HUB</h1>
    <h2>KEY SYSTEM</h2>
    <input id="keyInput" placeholder="Ingresa tu KEY...">
    <button onclick="checkMainKey()">Verificar</button>
</div>

<!-- MENU -->
<div class="container hidden" id="menu">
    <h1>SELECCIONA</h1>
    <button onclick="openPago()">EL 01 ROX HUB VIP - GITHUB</button>
    <button onclick="openGratis()">KEY GRATIS</button>
</div>

<!-- PAGO -->
<div class="container hidden" id="pago">
    <h1>VIP ACCESS</h1>
    <input id="vipKey" placeholder="Ingresa tu KEY VIP...">
    <button onclick="checkVip()">Verificar</button>
</div>

<!-- GRATIS -->
<div class="container hidden" id="gratis">
    <h1>KEY GRATIS</h1>
    <input id="freeKey" placeholder="Ingresa tu KEY...">
    <button onclick="checkFreeKey()">Verificar</button>
</div>

<!-- COPY -->
<div class="container hidden" id="copyBox">
    <h1>COPIA TU SCRIPT</h1>
    <input id="script" value='loadstring(game:HttpGet("https://raw.githubusercontent.com/mimi145324-svg/EL-01-ROX-HUB/main/main.lua"))()'>
    <button onclick="copyScript()">Copiar</button>
</div>

<!-- ERROR -->
<div id="error404">
    ERROR 404
</div>

<script>
// KEY PRINCIPAL
function checkMainKey() {
    let key = document.getElementById("keyInput").value;
    if (key === "EL 01 ROX HUB") {
        show("menu");
    } else {
        alert("Key incorrecta");
    }
}

// MENU
function openPago() {
    show("pago");
}

function openGratis() {
    show("gratis");
}

// VIP
function checkVip() {
    let key = document.getElementById("vipKey").value;
    if (key === "EL 01 ROX HUB VIP") {
        document.getElementById("error404").style.display = "flex";
    } else {
        alert("Key incorrecta");
    }
}

// GRATIS
function checkFreeKey() {
    let key = document.getElementById("freeKey").value;
    if (key === "EL 01 ROX HUB V1.2") {
        show("copyBox");
    } else {
        alert("Key incorrecta");
    }
}

// CAMBIO DE PANTALLA
function show(id) {
    document.querySelectorAll(".container").forEach(e => e.classList.add("hidden"));
    document.getElementById(id).classList.remove("hidden");
}

// COPIAR
function copyScript() {
    let text = document.getElementById("script");
    text.select();
    document.execCommand("copy");
    alert("Copiado!");
}

/* FONDO ANIMADO */
let canvas = document.getElementById("bg");
let ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let dots = [];

for (let i = 0; i < 120; i++) {
    dots.push({
        x: Math.random() * canvas.width,
        y: Math.random() * canvas.height,
        r: Math.random() * 2 + 1,
        dx: (Math.random() - 0.5) * 0.5,
        dy: (Math.random() - 0.5) * 0.5
    });
}

function draw() {
    ctx.clearRect(0,0,canvas.width,canvas.height);
    ctx.fillStyle = "white";

    dots.forEach(d => {
        d.x += d.dx;
        d.y += d.dy;

        if (d.x < 0 || d.x > canvas.width) d.dx *= -1;
        if (d.y < 0 || d.y > canvas.height) d.dy *= -1;

        ctx.beginPath();
        ctx.arc(d.x, d.y, d.r, 0, Math.PI*2);
        ctx.fill();
    });

    requestAnimationFrame(draw);
}

draw();
</script>

</body>
</html>
