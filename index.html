<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>EL 01 ROX HUB</title>
<style>
body {
    margin: 0;
    font-family: Arial;
    background: #000;
    overflow: hidden;
    color: white;
}

/* Fondo de bolitas */
canvas {
    position: fixed;
    top: 0;
    left: 0;
    z-index: 0;
}

/* Contenedor */
.container {
    position: relative;
    z-index: 2;
    width: 320px;
    margin: 120px auto;
    background: #111;
    padding: 25px;
    border-radius: 20px;
    text-align: center;
    box-shadow: 0 0 20px #000;
}

h1 {
    font-size: 18px;
}

input {
    width: 90%;
    padding: 12px;
    border-radius: 10px;
    border: none;
    background: #222;
    color: white;
    margin-top: 15px;
}

button {
    width: 95%;
    padding: 14px;
    margin-top: 15px;
    border: none;
    border-radius: 15px;
    background: #1e90ff;
    color: white;
    font-size: 16px;
    cursor: pointer;
}

.hidden {
    display: none;
}
</style>
</head>
<body>

<canvas id="bg"></canvas>

<!-- PANTALLA PRINCIPAL -->
<div class="container" id="main">
    <h1>EL 01 ROX HUB | KEY SYSTEM</h1>
    <input id="keyInput" placeholder="Ingresa tu KEY...">
    <button onclick="checkMainKey()">Verificar</button>
</div>

<!-- MENÚ -->
<div class="container hidden" id="menu">
    <h1>Selecciona tipo de KEY</h1>
    <button onclick="openPago()">KEY DE PAGA</button>
    <button onclick="openGratis()">KEY GRATIS</button>
</div>

<!-- PAGO -->
<div class="container hidden" id="pago">
    <h1>EL 01 ROX HUB VIP - GITHUB</h1>
    <button onclick="alert('Acceso VIP activado')">Continuar</button>
</div>

<!-- GRATIS -->
<div class="container hidden" id="gratis">
    <h1>KEY GRATIS</h1>
    <input id="freeKey" placeholder="Ingresa tu KEY...">
    <button onclick="checkFreeKey()">Verificar</button>
</div>

<!-- COPY -->
<div class="container hidden" id="copyBox">
    <h1>Copia tu script</h1>
    <input id="script" value='loadstring(game:HttpGet("https://raw.githubusercontent.com/mimi145324-svg/EL-01-ROX-HUB/main/main.lua"))()'>
    <button onclick="copyScript()">Copiar</button>
</div>

<script>
// VALIDACIÓN PRINCIPAL
function checkMainKey() {
    let key = document.getElementById("keyInput").value;
    if (key === "EL 01 ROX HUB") {
        show("menu");
    } else {
        alert("Key incorrecta");
    }
}

// MENÚ
function openPago() {
    show("pago");
}

function openGratis() {
    show("gratis");
}

// VALIDAR GRATIS
function checkFreeKey() {
    let key = document.getElementById("freeKey").value;
    if (key === "EL 01 ROX HUB V1.2") {
        show("copyBox");
    } else {
        alert("Key incorrecta");
    }
}

// CAMBIAR PANTALLAS
function show(id) {
    document.querySelectorAll(".container").forEach(e => e.classList.add("hidden"));
    document.getElementById(id).classList.remove("hidden");
}

// COPIAR
function copyScript() {
    let text = document.getElementById("script");
    text.select();
    document.execCommand("copy");
    alert("Copiado!");
}

// FONDO DE BOLITAS
let canvas = document.getElementById("bg");
let ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let dots = [];

for (let i = 0; i < 100; i++) {
    dots.push({
        x: Math.random() * canvas.width,
        y: Math.random() * canvas.height,
        r: Math.random() * 2 + 1
    });
}

function draw() {
    ctx.clearRect(0,0,canvas.width,canvas.height);
    ctx.fillStyle = "white";

    dots.forEach(d => {
        ctx.beginPath();
        ctx.arc(d.x, d.y, d.r, 0, Math.PI*2);
        ctx.fill();
    });

    requestAnimationFrame(draw);
}

draw();
</script>

</body>
</html>
