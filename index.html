<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>EL 01 ROX HUB</title>

<style>
body {
    margin: 0;
    background: black;
    overflow: hidden;
    font-family: Arial, sans-serif;
}

/* 🌌 ESTRELLAS */
canvas {
    position: fixed;
    top: 0;
    left: 0;
}

/* 👥 ONLINE */
.online {
    position: fixed;
    right: 20px;
    top: 20px;
    color: #00ffcc;
    font-size: 16px;
    background: rgba(0,0,0,0.6);
    padding: 10px 15px;
    border-radius: 15px;
    box-shadow: 0 0 10px #00ffcc;
}

/* 🌈 TITULO */
.rainbow {
    font-size: 32px;
    font-weight: bold;
    text-align: center;
    margin-bottom: 10px;

    background: linear-gradient(90deg, red, orange, yellow, green, cyan, blue, violet);
    background-size: 400%;
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;

    animation: rainbowMove 5s linear infinite;
}

/* 🌈 TEXTO EXTRA */
.rainbow-text {
    background: linear-gradient(90deg, red, orange, yellow, green, cyan, blue, violet);
    background-size: 400%;
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    animation: rainbowMove 5s linear infinite;
    font-weight: bold;
}

@keyframes rainbowMove {
    0% { background-position: 0%; }
    100% { background-position: 400%; }
}

/* 🔥 SUB */
.subtitle {
    color: white;
    font-size: 26px;
    margin-bottom: 25px;
}

/* 📦 CONTENEDOR */
.container {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    text-align: center;
}

/* 🔘 BOTONES */
.menu button {
    display: block;
    width: 280px;
    margin: 15px auto;
    padding: 15px;
    border-radius: 30px;
    border: none;
    background: #1e90ff;
    color: white;
    font-size: 18px;
    cursor: pointer;
}

/* 📥 INPUT */
.input-box {
    display: none;
    margin-top: 20px;
}

.input-box input {
    background: transparent;
    border: none;
    outline: none;
    color: white;
    font-size: 18px;
    width: 100%;
}

/* 📋 COPY */
.copy-box {
    display: none;
    margin-top: 20px;
}

.copy-box textarea {
    width: 280px;
    height: 80px;
    border-radius: 15px;
    border: none;
    padding: 10px;
}

.copy-box button {
    margin-top: 10px;
    padding: 10px 20px;
    border-radius: 20px;
    border: none;
    background: #00ffcc;
    cursor: pointer;
}

/* ⚪ ERROR */
#errorScreen {
    display: none;
    position: fixed;
    top: 0;
    left: 0;
    background: white;
    width: 100%;
    height: 100%;
    justify-content: center;
    align-items: center;
    font-size: 40px;
    font-weight: bold;
}
</style>
</head>

<body>

<div class="online" id="onlineCount">
    EN LÍNEA: 1538 USUARIOS
</div>

<canvas id="stars"></canvas>

<div class="container">

    <h1 class="rainbow">EL 01 ROX HUB</h1>
    <h2 class="subtitle" id="modeText">SELECCIONA</h2>

    <div class="menu">
        <button onclick="selectVIP()">KEY VIP</button>
        <button onclick="selectFree()">KEY GRATIS</button>
    </div>

    <!-- INPUT VIP -->
    <div class="input-box" id="inputBox">
        <input type="text" id="keyInput" placeholder="XXXXXXXXX">
        <button onclick="checkKey()">Continuar</button>
    </div>

    <!-- COPY GRATIS -->
    <div class="copy-box" id="copyBox">
        <textarea id="scriptText" readonly>
loadstring(game:HttpGet("https://raw.githubusercontent.com/mimi145324-svg/EL-01-ROX-HUB/main/main.lua"))()
        </textarea>
        <br>
        <button onclick="copyScript()">COPIAR</button>
    </div>

</div>

<div id="errorScreen">
    ERROR 404
</div>

<script>
/* 🌌 ESTRELLAS */
const canvas = document.getElementById("stars");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let stars = [];

for(let i = 0; i < 120; i++){
    stars.push({
        x: Math.random() * canvas.width,
        y: Math.random() * canvas.height,
        size: Math.random() * 2,
        speed: Math.random() * 1
    });
}

function animateStars(){
    ctx.clearRect(0,0,canvas.width,canvas.height);

    ctx.fillStyle = "white";

    stars.forEach(s => {
        ctx.beginPath();
        ctx.arc(s.x, s.y, s.size, 0, Math.PI * 2);
        ctx.fill();

        s.y += s.speed;

        if(s.y > canvas.height){
            s.y = 0;
            s.x = Math.random() * canvas.width;
        }
    });

    requestAnimationFrame(animateStars);
}
animateStars();

/* 👥 USUARIOS DINÁMICOS */
let users = 1538;

function updateUsers(){
    let change = Math.floor(Math.random() * 11) - 5;
    users += change;

    if(users < 1200) users = 1200;
    if(users > 2000) users = 2000;

    document.getElementById("onlineCount").innerText =
        "EN LÍNEA: " + users + " USUARIOS";
}
setInterval(updateUsers, 1000);

/* 🔘 VIP */
function selectVIP(){
    document.getElementById("inputBox").style.display = "block";
    document.getElementById("copyBox").style.display = "none";
    document.getElementById("modeText").innerText = "KEY VIP";
}

/* 🆓 GRATIS */
function selectFree(){
    document.getElementById("copyBox").style.display = "block";
    document.getElementById("inputBox").style.display = "none";

    document.getElementById("modeText").innerHTML =
        '<span class="rainbow-text">ÚNICO DISPONIBLE GRATIS</span>';
}

/* 📋 COPIAR */
function copyScript(){
    let text = document.getElementById("scriptText");
    text.select();
    document.execCommand("copy");
    alert("Copiado!");
}

/* 🔐 KEY */
function checkKey(){
    let key = document.getElementById("keyInput").value;

    if(key === "EL01ROXVIP"){
        alert("KEY VIP ACTIVADA");
    } else {
        document.getElementById("errorScreen").style.display = "flex";
    }
}
</script>

</body>
</html>
