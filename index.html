<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>EL 01 ROX HUB</title>

<style>
body {
    margin: 0;
    background: black;
    font-family: Arial;
    color: white;
    overflow: hidden;
}

/* RAINBOW */
.rainbow {
    background: linear-gradient(90deg, red, orange, yellow, green, cyan, blue, violet);
    background-size: 400%;
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    animation: rainbow 5s linear infinite;
}
@keyframes rainbow {
    0% {background-position: 0%}
    100% {background-position: 400%}
}

/* PARTICULAS */
canvas {
    position: fixed;
    top: 0;
    left: 0;
}

/* PANEL */
.panel {
    position: relative;
    z-index: 2;
    text-align: center;
    margin-top: 100px;
}

/* TITULO */
h1 {
    font-size: 50px;
}

/* KEY SYSTEM */
h2 {
    font-size: 40px;
}

/* BOTONES */
button {
    padding: 15px 30px;
    margin: 10px;
    border: none;
    background: #111;
    color: white;
    font-size: 18px;
    border-radius: 10px;
    cursor: pointer;
}
button:hover {
    background: #333;
}

/* INPUT */
input {
    padding: 15px;
    width: 300px;
    margin-top: 20px;
    border-radius: 10px;
    border: none;
    background: #111;
    color: white;
    text-align: center;
}

/* BOX NEGRA */
.box {
    background: #111;
    padding: 20px;
    border-radius: 10px;
    margin-top: 20px;
    display: inline-block;
}

/* CONTADOR */
.users {
    position: absolute;
    right: 20px;
    top: 20px;
    font-size: 18px;
}
</style>
</head>

<body>

<canvas id="bg"></canvas>

<div class="users">
EN LÍNEA <span id="count">1538</span> USUARIOS
</div>

<div class="panel" id="main">

<h1 class="rainbow">EL 01 ROX HUB</h1>
<h2>KEY SYSTEM</h2>

<button onclick="vip()">KEY VIP</button>
<button onclick="gratis()">KEY GRATIS</button>

</div>

<script>
/* PARTICULAS */
let canvas = document.getElementById("bg");
let ctx = canvas.getContext("2d");
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let particles = [];

for (let i = 0; i < 100; i++) {
    particles.push({
        x: Math.random()*canvas.width,
        y: Math.random()*canvas.height,
        r: Math.random()*2+1,
        dx: Math.random()-0.5,
        dy: Math.random()-0.5
    });
}

function draw() {
    ctx.clearRect(0,0,canvas.width,canvas.height);
    ctx.fillStyle="white";
    particles.forEach(p=>{
        ctx.beginPath();
        ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
        ctx.fill();
        p.x+=p.dx;
        p.y+=p.dy;
        if(p.x<0||p.x>canvas.width)p.dx*=-1;
        if(p.y<0||p.y>canvas.height)p.dy*=-1;
    });
    requestAnimationFrame(draw);
}
draw();

/* CONTADOR */
let count = 1538;
setInterval(()=>{
    count += Math.floor(Math.random()*5-2);
    document.getElementById("count").innerText = count;
},1000);

/* GRATIS */
function gratis(){
document.getElementById("main").innerHTML = `
<h2>KEY GRATIS</h2>
<input id="key" placeholder="XXXXXXXXX">
<br>
<button onclick="checkGratis()">ENTRAR</button>
`;
}

function checkGratis(){
let key = document.getElementById("key").value;

if(key === "EL 01 ROX HUB V1.2"){
document.getElementById("main").innerHTML = `
<h2 style="color:lime;">CORRECTA</h2>
<h2 class="rainbow">ÚNICO SCRIPT DISPONIBLE</h2>

<div class="box">
<p class="rainbow">ÚNICO DISPONIBLE GRATIS</p>
<p id="code">loadstring(game:HttpGet("https://raw.githubusercontent.com/mimi145324-svg/EL-01-ROX-HUB/main/main.lua"))()</p>
<button onclick="copy()">COPIAR</button>
</div>
`;
} else {
alert("KEY INCORRECTA");
}
}

/* COPIAR */
function copy(){
let text = document.getElementById("code").innerText;
navigator.clipboard.writeText(text);
alert("Copiado!");
}

/* VIP */
function vip(){
document.getElementById("main").innerHTML = `
<h2>KEY VIP</h2>
<input id="vipkey" placeholder="XXXXXXXXX">
<br>
<button onclick="checkVIP()">ENTRAR</button>
`;
}

function checkVIP(){
let key = document.getElementById("vipkey").value;

if(key === "EL 01 ROX HUB"){
document.body.innerHTML = `
<canvas id="bg"></canvas>
<h1 class="rainbow" style="text-align:center;margin-top:200px;">
EN MANTENIMIENTO<br>SCRIPTS NO DISPONIBLES
</h1>
`;
} else {
alert("KEY INCORRECTA");
}
}
</script>

</body>
</html>
