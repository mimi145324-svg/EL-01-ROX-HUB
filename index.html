<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verificación de KEY</title>

    <style>
        body {
            margin: 0;
            overflow: hidden;
            background: black;
            font-family: Arial, sans-serif;
        }

        canvas {
            position: fixed;
            top: 0;
            left: 0;
            z-index: 0;
        }

        .container {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            z-index: 1;
            color: white;
        }

        input {
            width: 260px;
            padding: 12px;
            border: 1px solid white;
            border-radius: 8px;
            background: #111;
            color: white;
            text-align: center;
            outline: none;
        }

        button {
            margin-top: 10px;
            padding: 10px 25px;
            border: none;
            border-radius: 8px;
            background: white;
            color: black;
            cursor: pointer;
            font-weight: bold;
        }

        #mensaje {
            margin-top: 15px;
        }
    </style>
</head>
<body>

<canvas id="bg"></canvas>

<div class="container">
    <h2>Ingresa tu KEY</h2>
    <input type="password" id="keyInput" placeholder="Escribe la KEY">
    <br>
    <button onclick="verificarKey()">Entrar</button>
    <p id="mensaje"></p>
</div>

<script>
    function verificarKey() {
        const keyCorrecta = "EL01-4E8ID1H7A1WY81";
        const keyIngresada = document.getElementById("keyInput").value;

        if (keyIngresada === keyCorrecta) {
            document.getElementById("mensaje").innerText = "Acceso concedido";
        } else {
            document.getElementById("mensaje").innerText = "KEY incorrecta";
        }
    }

    const canvas = document.getElementById("bg");
    const ctx = canvas.getContext("2d");

    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;

    const particles = [];

    for (let i = 0; i < 120; i++) {
        particles.push({
            x: Math.random() * canvas.width,
            y: Math.random() * canvas.height,
            radius: Math.random() * 3 + 1,
            speedX: (Math.random() - 0.5) * 1,
            speedY: (Math.random() - 0.5) * 1
        });
    }

    function animate() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        particles.forEach(p => {
            ctx.beginPath();
            ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2);
            ctx.fillStyle = "white";
            ctx.fill();

            p.x += p.speedX;
            p.y += p.speedY;

            if (p.x < 0) p.x = canvas.width;
            if (p.x > canvas.width) p.x = 0;
            if (p.y < 0) p.y = canvas.height;
            if (p.y > canvas.height) p.y = 0;
        });

        requestAnimationFrame(animate);
    }

    animate();

    window.addEventListener("resize", () => {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
    });
</script>

</body>
</html>
