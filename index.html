<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>EL 01 ROX HUB</title>

<style>
body {
    margin: 0;
    background: black;
    overflow: hidden;
    font-family: Arial, sans-serif;
}

/* 🌌 CANVAS */
canvas {
    position: fixed;
    top: 0;
    left: 0;
}

/* 👥 ONLINE */
.online {
    position: fixed;
    right: 20px;
    top: 20px;
    color: #00ffcc;
    font-size: 16px;
    background: rgba(0,0,0,0.6);
    padding: 10px 15px;
    border-radius: 15px;
    box-shadow: 0 0 10px #00ffcc;
}

/* 🌈 TITULOS */
.rainbow {
    font-size: 32px;
    font-weight: bold;
    text-align: center;
    margin-bottom: 10px;

    background: linear-gradient(90deg, red, orange, yellow, green, cyan, blue, violet);
    background-size: 400%;
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;

    animation: rainbowMove 5s linear infinite;
}

.rainbow-text {
    background: linear-gradient(90deg, red, orange, yellow, green, cyan, blue, violet);
    background-size: 400%;
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    animation: rainbowMove 5s linear infinite;
    font-weight: bold;
}

@keyframes rainbowMove {
    0% { background-position: 0%; }
    100% { background-position: 400%; }
}

/* 📦 CONTENEDOR */
.container {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    text-align: center;
}

/* 🔘 BOTONES */
.menu button {
    display: block;
    width: 280px;
    margin: 15px auto;
    padding: 15px;
    border-radius: 30px;
    border: none;
    background: #1e90ff;
    color: white;
    font-size: 18px;
    cursor: pointer;
}

/* INPUT */
.input-box {
    display: none;
    margin-top: 20px;
}

.input-box input {
    background: #111;
    border: none;
    color: white;
    padding: 12px;
    border-radius: 20px;
    width: 280px;
}

/* COPY */
.copy-box {
    display: none;
    margin-top: 20px;
    background: #111;
    padding: 15px;
    border-radius: 20px;
}

.copy-box textarea {
    width: 100%;
    height: 80px;
    background: black;
    color: #00ffcc;
    border: none;
    border-radius: 10px;
}

/* 🛠️ MANTENIMIENTO */
.maintenance {
    display: none;
    position: fixed;
    width: 100%;
    height: 100%;
    background: black;
    justify-content: center;
    align-items: center;
    text-align: center;
    z-index: 999;
}

.maintenance h1 {
    font-size: 35px;
}

/* ERROR */
#errorScreen {
    display: none;
    position: fixed;
    width: 100%;
    height: 100%;
    background: white;
    justify-content: center;
    align-items: center;
    font-size: 40px;
}
</style>
</head>

<body>

<div class="online" id="onlineCount">
    EN LÍNEA: 1538 USUARIOS
</div>

<canvas id="stars"></canvas>

<div class="container">

    <h1 class="rainbow">EL 01 ROX HUB</h1>
    <h2 id="modeText">SELECCIONA</h2>

    <div class="menu">
        <button onclick="selectVIP()">KEY VIP</button>
        <button onclick="selectFree()">KEY GRATIS</button>
    </div>

    <div class="input-box" id="inputBox">
        <input type="text" id="keyInput" placeholder="XXXXXXXXX">
        <br><br>
        <button onclick="checkKey()">Continuar</button>
    </div>

    <div class="copy-box" id="copyBox">
<textarea readonly id="scriptText">
loadstring(game:HttpGet("https://raw.githubusercontent.com/mimi145324-svg/EL-01-ROX-HUB/main/main.lua"))()
</textarea>
        <button onclick="copyScript()">COPIAR</button>
    </div>

</div>

<!-- 🛠️ PANTALLA MANTENIMIENTO -->
<div class="maintenance" id="maintenanceScreen">
    <h1 class="rainbow-text">
        EN MANTENIMIENTO<br>
        SCRIPTS NO DISPONIBLES
    </h1>
</div>

<div id="errorScreen">ERROR 404</div>

<script>
/* 🌌 ESTRELLAS */
const canvas = document.getElementById("stars");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let stars = [];

for(let i = 0; i < 120; i++){
    stars.push({
        x: Math.random() * canvas.width,
        y: Math.random() * canvas.height,
        size: Math.random() * 2,
        speed: Math.random() * 1
    });
}

function animateStars(){
    ctx.clearRect(0,0,canvas.width,canvas.height);

    ctx.fillStyle = "white";

    stars.forEach(s => {
        ctx.beginPath();
        ctx.arc(s.x, s.y, s.size, 0, Math.PI * 2);
        ctx.fill();

        s.y += s.speed;

        if(s.y > canvas.height){
            s.y = 0;
            s.x = Math.random() * canvas.width;
        }
    });

    requestAnimationFrame(animateStars);
}
animateStars();

/* 👥 USUARIOS */
let users = 1538;
setInterval(() => {
    users += Math.floor(Math.random()*11)-5;
    if(users<1200) users=1200;
    if(users>2000) users=2000;

    document.getElementById("onlineCount").innerText =
        "EN LÍNEA: " + users + " USUARIOS";
},1000);

/* MODOS */
function selectVIP(){
    document.getElementById("inputBox").style.display="block";
    document.getElementById("copyBox").style.display="none";
    document.getElementById("modeText").innerText="KEY VIP";
}

function selectFree(){
    document.getElementById("inputBox").style.display="block";
    document.getElementById("copyBox").style.display="none";

    document.getElementById("modeText").innerHTML =
        '<span class="rainbow-text">ÚNICO DISPONIBLE GRATIS</span>';
}

/* VALIDACIÓN */
function checkKey(){
    let key = document.getElementById("keyInput").value;

    if(key === "EL01ROXVIP"){
        document.getElementById("maintenanceScreen").style.display="flex";
    }
    else if(key === "GRATIS123"){
        document.getElementById("copyBox").style.display="block";
    }
    else{
        document.getElementById("errorScreen").style.display="flex";
    }
}

/* COPIAR */
function copyScript(){
    let text=document.getElementById("scriptText");
    text.select();
    document.execCommand("copy");
    alert("Copiado!");
}
</script>

</body>
</html>
